AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: RSG Invoice Processor (SAM) — Node.js 22 + public Chromium layer

Globals:
  Function:
    Runtime: nodejs22.x            # ← Node 22 runtime
    Architectures: [x86_64]
    Timeout: 900
    MemorySize: 3008
    Environment:
      Variables:
        FROM_EMAIL: !Ref FromEmail
        TO_EMAILS: !Ref ToEmails
        deploy_region: !Ref DeployRegion   # ← your custom var stays
        INVOICE_PROCESSOR_LOCK_TABLE: !Ref InvoiceProcessorLockTable
        INVOICE_PROCESSOR_LOCK_NAME: rsg-invoice-processor
    EphemeralStorage:
      Size: 2048

Parameters:
  FromEmail:
    Type: String
    Default: dreuven@rsgsecurity.com
  ToEmails:
    Type: String
    Default: ar@rsgsecurity.com
  DeployRegion:
    Type: String
    Default: us-west-1
  # Public Chrome layer ARN (region-specific). Override if needed.
  ChromiumLayerArn:
    Type: String
    Default: arn:aws:lambda:us-west-1:764866452798:layer:chrome-aws-lambda:63
    Description: Public Chrome AWS Lambda layer for us-west-1 (includes Chromium + shared libs)
  LogRetentionInDays:
    Type: Number
    Default: 90
    Description: Number of days to retain CloudWatch logs

Resources:
  InvoiceProcessorLockTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RSGInvoiceProcessorLocks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: LockName
          AttributeType: S
      KeySchema:
        - AttributeName: LockName
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ExpiresAt
        Enabled: true

  # CloudWatch Logs Group
  InvoiceProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/RSGInvoiceProcessor
      RetentionInDays: !Ref LogRetentionInDays

  InvoiceProcessorFunction:
    Type: AWS::Serverless::Function
    DependsOn: InvoiceProcessorLogGroup
    Metadata:
      BuildMethod: nodejs22.x
    Properties:
      FunctionName: RSGInvoiceProcessor
      Description: Automated invoice processing - Fulcrum creation + QBO sending
      CodeUri: .
      Handler: V2_emailSender.handler
      Layers:
        - !Ref ChromiumLayerArn     # ← use the public layer (no custom layer needed)
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:PutParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/qbo-invoice-sender/*
            # Read-only: Fulcrum public API key for FULCRUM_API_MODE (specs/013).
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/rsg-ai/prod/fulcrum-api-key
            - Effect: Allow
              Action: ses:SendEmail
              Resource: "*"
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:DeleteItem
              Resource: !GetAtt InvoiceProcessorLockTable.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !GetAtt InvoiceProcessorLogGroup.Arn
      Events:
        Daily5pmPT:
          Type: ScheduleV2
          Properties:
            Description: Run every day at 5:00 PM America/Los_Angeles
            ScheduleExpression: "cron(0 17 * * ? *)"
            ScheduleExpressionTimezone: "America/Los_Angeles"
            # Re-enabled 2026-06-10 after the error-reporting/routing/allowlist fixes.
            State: "ENABLED"
            FlexibleTimeWindow:
              Mode: "OFF"

Outputs:
  FunctionName:
    Description: Deployed Lambda function name
    Value: !Ref InvoiceProcessorFunction
  FunctionArn:
    Description: Deployed Lambda function ARN
    Value: !GetAtt InvoiceProcessorFunction.Arn
  LogGroupName:
    Description: CloudWatch Logs group name
    Value: !Ref InvoiceProcessorLogGroup
  UsingChromiumLayer:
    Description: Chromium layer ARN used by the function
    Value: !Ref ChromiumLayerArn
